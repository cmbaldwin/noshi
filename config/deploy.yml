# Name of your application. Used to uniquely configure containers.
service: noshi

# Name of the container image.
image: cmbaldwin/noshi

# Deploy to these servers.
# TODO: Replace with your Hetzner server IP address
servers:
  web:
    - YOUR_HETZNER_SERVER_IP
  # Uncomment if you need background job workers
  # job:
  #   hosts:
  #     - YOUR_HETZNER_SERVER_IP
  #   cmd: bundle exec sidekiq

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
proxy:
  ssl: true
  host: noshi.yourdomain.com  # TODO: Replace with your domain
  # Proxy connects to your container on port 3000 by default (via Thruster)
  app_port: 3000

# Credentials for your image host (Docker Hub or GitHub Container Registry).
registry:
  # For Docker Hub (default):
  username: cmbaldwin
  password:
    - KAMAL_REGISTRY_PASSWORD

  # Or for GitHub Container Registry (ghcr.io):
  # server: ghcr.io
  # username: cmbaldwin
  # password:
  #   - KAMAL_REGISTRY_PASSWORD

# Configure builder setup.
builder:
  arch: amd64
  # Use local builder for faster builds on the same machine
  local:
    arch: amd64
    host: unix:///var/run/docker.sock

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  clear:
    RAILS_LOG_TO_STDOUT: true
    RAILS_SERVE_STATIC_FILES: true
  secret:
    - RAILS_MASTER_KEY
    - REDIS_URL

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal app logs -r job" will tail logs from the first server in the job section.
#
# aliases:
#   shell: app exec --interactive --reuse "bash"

# Use a different ssh user than root
#
# ssh:
#   user: app

# Use a persistent storage volume for logs and tmp files
volumes:
  - "noshi_storage:/rails/storage"
  - "noshi_logs:/rails/log"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
#
# asset_path: /app/public/assets

# Configure rolling deploys by setting a wait time between batches of restarts.
#
# boot:
#   limit: 10 # Can also specify as a percentage of total hosts, such as "25%"
#   wait: 2

# Use accessory services (secrets come from .kamal/secrets).
# Redis is required for Action Cable and caching
accessories:
  redis:
    image: redis:7-alpine
    host: YOUR_HETZNER_SERVER_IP  # TODO: Replace with your Hetzner server IP
    port: 6379
    directories:
      - data:/data
    cmd: "redis-server --appendonly yes"
